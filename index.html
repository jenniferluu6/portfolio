<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jun Luu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky:        #327ce3;
      --cream:      #F8F4EC;
      --cream-dim:  rgba(248,244,236,0.65);
      --cream-faint:rgba(248,244,236,0.38);
      --forest:     #1A2E1E;
      --forest-mid: #243528;
      --orange:     #D95A18;
      --rule:       rgba(248,244,236,0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      flex: 1;
      min-height: calc(100vh - 56px);
      background: var(--sky);
      overflow: hidden;
    }

    /* Photo: top-right, no distortion, natural proportions */
    .hero-photo {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: auto;
      max-width: 85%;
      object-fit: cover;
      object-position: left top;
      pointer-events: none;
      user-select: none;
    }

    /* Fade left edge of photo into sky blue */
    .hero-photo-fade {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 52%;
      background: linear-gradient(to right, var(--sky) 0%, var(--sky) 35%, transparent 68%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 52px;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.15s forwards;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.35s forwards;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream-dim);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: var(--cream);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-links a:hover::after { transform: scaleX(1); }

    /* ── MAIN TEXT ── */
    .hero-content {
      position: absolute;
      bottom: 80px;
      left: 52px;
      z-index: 10;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cream-faint);
      margin-bottom: 22px;
      opacity: 0;
      animation: riseIn 0.9s ease 0.7s forwards;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      line-height: 0.86;
    }

    .name-given {
      display: block;
      font-size: clamp(86px, 12vw, 130px);
      color: var(--cream);
      opacity: 0;
      animation: riseIn 1s ease 0.95s forwards;
    }

    .name-family {
      display: block;
      font-size: clamp(86px, 12vw, 130px);
      padding-left: clamp(18px, 2vw, 28px);
      color: var(--cream);
      opacity: 0;
      animation: riseIn 1s ease 1.22s forwards;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--forest);
      padding: 14px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-top: 1px solid var(--forest-mid);
    }

    footer p {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(214,228,216,0.3);
    }

    footer a {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(214,228,216,0.3);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: rgba(214,228,216,0.7); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      nav { padding: 24px 24px; }
      .nav-links { gap: 20px; }
      .hero-content { left: 24px; bottom: 52px; }
      .hero-photo { max-width: 80%; }
      .hero-photo-fade { width: 65%; }
      footer { padding: 14px 24px; flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="hero">

    <img
      class="hero-photo"
      src="images/cover-photo.png"
      alt=""
      aria-hidden="true"
    >
    <div class="hero-photo-fade"></div>

    <nav>
      <a href="index.html" class="nav-logo">JL</a>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="inspiration.html">Inspiration</a></li>
        <li><a href="cv_jluu.html">CV</a></li>
      </ul>
    </nav>

    <div class="hero-content">
      <p class="eyebrow">Urban Spatial Analyst &amp; Researcher</p>
      <div class="hero-name">
        <span class="name-given">Jun</span>
        <span class="name-family">Luu</span>
      </div>
    </div>

  </div>

  <footer>
    <p>© 2026 Jun Luu</p>
    <p>MUSA &nbsp;·&nbsp; University of Pennsylvania</p>
  </footer>

</body>
</html>
